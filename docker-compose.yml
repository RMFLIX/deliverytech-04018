version:'3.8'

sercices:
  app:
    build: .
    container_name: delivery

    ports:
     -"8080:8080"

      enveroment:
      - SPRING_DATA_REDIS_HOST= redis-caches
      - SPRING_DATA_REDIS_PORT: 6379
      - SPRING_CACHE_TYPE: redis

     depends_on:
       - redis

   networks:
     - delivery-network

   redis:
     image: redis:7-alpine
     container_name: redis-cache

   ports:
     -"6379-6379"

   volumes:
     - redis_data:/data
   networks:
     - delivery-network

volumes:
 redis_data:

networks:
 delivery-network:
   driver: bridge