spring.application.name=delivery-api
server.port=8080
 
spring.datasource.url=jdbc:h2:mem:deliverydb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
 
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
spring.devtools.restart.enabled=false
spring.jpa.open-in-view=false
 
 logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.com.deliverytech.delivery_api=DEBUG



springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

management.endpoints.web.exposure.include=health,info,metrics,env,prometheus
management.endpoints.health.show.details=always
management.endpoints.info.enabled=true
management.endpoints.metrics.enabled=true
management.endpoints.prometheus.enabled=true


management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

management.info.env.enabled=true

info.app.name=Delivery Tech Api
info.app.version=1.0.0
info.app.description=API de delivery

spring.main.allow-bean-definition-overriding=true